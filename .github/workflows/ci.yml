name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Pre-commit runs locally but is skippable via `git commit --no-verify`.
  # This job makes every configured hook mandatory on the server side, so
  # gitleaks + semgrep are enforced.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # No `version:` here — it is read from package.json's `packageManager`
      # field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install semgrep + pre-commit
        run: pip install semgrep==1.165.0 pre-commit==4.6.0

      - name: Cache pre-commit environment
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # No `version:` here — it is read from package.json's `packageManager`
      # field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the build on high/critical CVEs in the production dependency tree.
      # Mirrors `make audit` and the pnpm-audit pre-commit hook.
      - name: Audit dependencies (production, blocking)
        run: pnpm audit --prod --audit-level high

      # Non-blocking full-tree audit: surfaces CVEs in the BUILD TOOLCHAIN
      # (dev-dependencies) without failing the PR. Advisory only — the blocking
      # gate above is the production tree.
      - name: Audit dependencies (full tree, advisory)
        continue-on-error: true
        run: pnpm audit

      - name: Generate MSW worker
        run: pnpm exec msw init tests/public --no-save

      - name: Lint
        run: pnpm exec eslint . --max-warnings 0

      - name: Format check
        run: pnpm exec prettier --check .

      - name: Type-check
        run: |
          pnpm exec svelte-check --tsconfig ./tsconfig.app.json
          pnpm exec tsc -p tsconfig.node.json
          pnpm exec tsc -p tsconfig.e2e.json
          pnpm exec tsc -p tsconfig.bff.json

      # Pins extract-changelog.sh behaviour — the release pipeline depends on it.
      # No browser needed, so it runs before the Playwright install and fails fast.
      - name: Script tests
        run: node --test scripts/*.test.mjs

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Unit + component tests (coverage)
        run: pnpm exec vitest run --coverage

      - name: Build
        run: pnpm build

      # Enforce the CSP guarantee in CI, not just the manual `make csp-check`:
      # loads the built bundle in a real browser and fails on any CSP violation,
      # so a `script-src 'self'` regression fails the PR. Reuses the chromium
      # installed above.
      - name: CSP check (script-src 'self' in a real browser)
        run: make csp-check

      - name: Bundle-size budget
        run: node scripts/check-bundle-size.mjs

      - name: E2E (Playwright)
        run: pnpm exec playwright test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  # Catches release-pipeline regressions on PR rather than at tag time: that the
  # release tarball still assembles (svelte-check + build + flat layout +
  # Caddyfile) and that the CHANGELOG has extractable content. Mirrors
  # go-api-template's goreleaser-config job.
  release-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # No `version:` here — it is read from package.json's `packageManager`
      # field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Assert only that the `## [Unreleased]` section EXISTS and parses — NOT
      # that it is non-empty. Right after a release cut the section is
      # legitimately empty (it is empty now, deliberately), so `--allow-empty`
      # skips the emptiness rejection here. Non-emptiness is enforced only on the
      # release path (release.yml + `make changelog-check`, both flagless), where
      # a real tag extracts `## [X.Y.Z]` and an empty section must abort the tag.
      - name: CHANGELOG is extractable
        run: sh ./scripts/extract-changelog.sh --allow-empty Unreleased CHANGELOG.md > /dev/null

      # Assemble the release tarball exactly as `make prod-bundle` does, so a
      # broken build or packaging step fails here, not at tag time.
      - name: Dry-run release packaging
        run: make prod-bundle
