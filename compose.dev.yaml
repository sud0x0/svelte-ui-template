# ============================================================================
# THIS IS FOR LOCAL DEVELOPMENT ONLY
# ============================================================================
# Requires a .env file — see .env.example.

services:
  app:
    build:
      context: .
      dockerfile: container.dev
    container_name: svelte_ui
    volumes:
      - .:/app:Z
      - node_modules:/app/node_modules:Z
    ports:
      # Bind to loopback only: the dev server is for THIS machine, not the LAN.
      # Without the 127.0.0.1 prefix the port publishes on 0.0.0.0 and anyone on
      # the network can reach the dev stack (and its backend proxy) (fix 2).
      - '127.0.0.1:3000:3000'
    environment:
      # Where the Vite dev proxy forwards /api, /auth, /health. The target
      # depends on the auth mode:
      #   disabled — point at the Go API directly (default below).
      #   bff      — point at the BFF instead, so /auth/* and /api/* flow
      #              Browser -> Vite -> BFF -> Go API. In-compose that is
      #              http://bff:8081; bare-metal it is http://localhost:8081.
      # Fallback keeps a bare .env reaching the host's backend: without it the
      # in-container proxy would default to localhost:8080 inside the container's
      # own netns. Matches .env.example.
      VITE_API_TARGET: ${VITE_API_TARGET:-http://host.containers.internal:8080}
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-disabled}
    command: pnpm dev --host 0.0.0.0

  # The Backend-for-Frontend: confidential OIDC client + authenticated /api proxy.
  # Only needed in bff mode (set VITE_API_TARGET=http://bff:8081 on `app` then).
  # It depends on NOTHING in this compose file — the Go API stays external and is
  # reached via BFF_API_UPSTREAM (host.containers.internal by default), and the
  # IdP is external via BFF_ISSUER_URL.
  bff:
    build:
      context: .
      dockerfile: container.bff
    container_name: svelte_bff
    ports:
      # Loopback only (fix 2) — same reasoning as the app service above. The BFF
      # is reached in-compose via the service name (http://bff:8081); this host
      # publish is a dev convenience, not a LAN-exposed endpoint.
      - '127.0.0.1:8081:8081'
    environment:
      BFF_PORT: '8081'
      # The UI origin the browser reaches the BFF THROUGH (Vite :3000 proxies
      # /auth,/api,/health to the BFF), NOT the BFF's own :8081. redirect_uri and
      # the __Host- cookies are scoped to this origin (fix 1).
      BFF_PUBLIC_ORIGIN: ${BFF_PUBLIC_ORIGIN:-http://localhost:3000}
      BFF_ISSUER_URL: ${BFF_ISSUER_URL}
      BFF_CLIENT_ID: ${BFF_CLIENT_ID}
      BFF_CLIENT_SECRET: ${BFF_CLIENT_SECRET}
      # The Go API the BFF proxies to; same host default as the SPA dev proxy.
      BFF_API_UPSTREAM: ${BFF_API_UPSTREAM:-http://host.containers.internal:8080}
      # Upstream call timeout in ms, integer in (0, 60000], default 10000.
      BFF_API_TIMEOUT_MS: ${BFF_API_TIMEOUT_MS:-10000}
      BFF_COOKIE_SECRET: ${BFF_COOKIE_SECRET}
      BFF_SCOPES: ${BFF_SCOPES:-openid profile email}
      # Access-token audience — MUST equal go-api-template's OIDC_AUDIENCE or the
      # Go API 401s every proxied call. Empty by default (unset) (fix 3).
      BFF_AUDIENCE: ${BFF_AUDIENCE:-}
      # DEV ONLY: this dev compose defaults BFF_API_UPSTREAM to a NON-loopback
      # plain-http host (host.containers.internal), which requireSecureBackendUrl
      # would otherwise reject — so opt into insecure transport by default HERE
      # (dev compose only). Never set true in production (fix 2).
      BFF_DEV_INSECURE: ${BFF_DEV_INSECURE:-true}

volumes:
  node_modules:
