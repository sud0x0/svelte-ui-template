<?xml version="1.0" encoding="UTF-8"?>
<!--
  SVG sprite. Reference a symbol with:
    <svg class="icon" aria-hidden="true"><use href="/icons.svg#check" /></svg>
  Add new symbols here so icons stay a single same-origin asset (CSP img-src 'self').
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display: none">
  <symbol id="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12" />
  </symbol>
  <symbol id="close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18" />
    <line x1="6" y1="6" x2="18" y2="18" />
  </symbol>
  <symbol id="alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10" />
    <line x1="12" y1="8" x2="12" y2="12" />
    <line x1="12" y1="16" x2="12.01" y2="16" />
  </symbol>
</svg>
